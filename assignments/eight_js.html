<!DOCTYPE html>
<html>
<head>
  <title>Job Opportunities</title>

  <style>
    body {
      font-family: Arial;
      margin: 30px;
    }

    #result {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h2>JOB OPPORTUNITIES</h2>

<form onsubmit="showData(event)">
  
  Name:
  <input type="text" id="name" value="Prathibha">
  <br><br>

  Education:
  <select id="edu">
    <option>Graduate</option>
    <option>UG</option>
    <option>PG</option>
  </select>
  <br><br>

  Email:
  <input type="email" id="email">
  <br><br>

  Gender:
  <input type="radio" name="gender" value="Male"> Male
  <input type="radio" name="gender" value="Female"> Female
  <br><br>

  Languages:
  <input type="checkbox" value="Java" class="lang"> Java
  <input type="checkbox" value="C++" class="lang"> C++
  <input type="checkbox" value="Python" class="lang"> Python
  <br><br>

  <button type="submit">Submit</button>

</form>

<div id="result"></div>

<script>
function showData(e) {
  e.preventDefault();

  let name = document.getElementById("name").value;
  let edu = document.getElementById("edu").value;
  let email = document.getElementById("email").value;

  let gender = document.querySelector('input[name="gender"]:checked');
  gender = gender ? gender.value : "Not selected";

  let langs = document.querySelectorAll(".lang:checked");
  let list = [];
  langs.forEach(l => list.push(l.value));

  document.getElementById("result").innerHTML =
    "Name: " + name + "<br>" +
    "Education: " + edu + "<br>" +
    "Email: " + email + "<br>" +
    "Gender: " + gender + "<br>" +
    "Languages: " + list.join(", ");
}
</script>

</body>
</html>
