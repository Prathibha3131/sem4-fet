<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Changing Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: #fff;
      padding: 50px;
    }
    button {
      padding: 10px 20px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1 id="name">My Portfolio</h1>
  <p id="role">Click the button to personalize</p>

  <button onclick="customize()">Customize</button>

  <script>
    function customize() {
      alert("Welcome to my portfolio!");

      let userName = prompt("What is your name?");
      let userRole = prompt("What do you do?");

      if (userName && userRole) {
        document.getElementById("name").innerText = userName + "'s Portfolio";
        document.getElementById("role").innerText = "I am a " + userRole;

        alert("Nice to meet you, " + userName + "!");
      } else {
        alert("You didn't enter details!");
      }
    }
  </script>

</body>
</html>
